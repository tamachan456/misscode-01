<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ミスコード入力_最終調整版</title>
<style>
:root {
    --bg-a: linear-gradient(135deg, #4a5d73, #66788f);
    --bg-b: linear-gradient(135deg, #7a5c5c, #967676);
    --color-a: #2e75b6;
    --color-b: #c00000;
}

* {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
    overflow: hidden;
    color: #f0f0f0;
    height: 100dvh;
    background: var(--bg-a);
}

body.player-b-mode { background: var(--bg-b); }

.container {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: 4px;
}

.header-info {
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 4px;
    background: rgba(0, 0, 0, 0.25);
    border-radius: 5px;
    padding: 4px;
}

/* 出力エリア：動的に伸び、下の要素を押し潰す */
.output {
    background: rgba(255, 255, 255, 0.95);
    color: #222;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 20px;
    font-weight: bold;
    min-height: 80px; 
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    white-space: pre-wrap;
    word-break: break-all;
    margin-bottom: 4px;
    line-height: 1.2;
}

.score-row { display: block; margin-bottom: 2px; }

/* 出力エリアの得点（2サイズ縮小済み） */
.score-big {
    font-size: 24px; 
    color: #d32f2f;
    margin-right: 8px;
    font-weight: 900;
}

.bar {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
    flex-shrink: 0;
}
.bar button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: #555;
}

.btn-undo-a { background: var(--color-a) !important; }
.btn-undo-b { background: var(--color-b) !important; }
button.disabled-undo { opacity: 0.15 !important; pointer-events: none; }

.content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
}

.player-panel { height: 100%; display: flex; flex-direction: column; }

.sections {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    height: 100%;
    flex: 1;
}

.section {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 2px;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.section-title {
    font-size: 15px;
    padding-bottom: 2px;
    margin-bottom: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: #ffeb3b;
    text-align: center;
    font-weight: 900;
    flex-shrink: 0;
}

.btn-item {
    display: flex;
    flex-direction: row-reverse;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    flex: 1;
    min-height: 0;
}

.code-btn {
    width: 46px;
    height: 46px;
    min-width: 46px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    background: linear-gradient(145deg, #555, #1a1a1a);
    display: flex; justify-content: center; align-items: center;
}

.code-label {
    font-size: 14px; 
    font-weight: 900;
    color: #fff;
    line-height: 1.0; 
    text-align: right;
    flex: 1;
}

.code-btn.flash { background: #ffd600 !important; color: #000 !important; }

.footer-nav { display: flex; gap: 8px; height: 75px; padding-top: 4px; flex-shrink: 0; }
.nav-btn { flex: 1; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; font-size: 24px; font-weight: bold; color: #fff; opacity: 0.4; }
.nav-btn.active { opacity: 1; border-color: #fff; }
.btnA { background: var(--color-a); }
.btnB { background: var(--color-b); }

</style>
</head>
<body id="mainBody">

<div class="container">
    <div class="header-info" id="statusLabel">ミスコード入力　【A選手】</div>
    <div id="sharedOutput" class="output"></div>

    <div class="bar">
        <button onclick="calculateAndReset()">全リセット</button>
        <button id="undoA" class="btn-undo-a" onclick="undo('A')">A消す</button>
        <button id="undoB" class="btn-undo-b disabled-undo" onclick="undo('B')">B消す</button>
    </div>

    <div class="content-area">
        <div id="panelA" class="player-panel">
            <div class="sections" id="Asections"></div>
        </div>
        <div id="panelB" class="player-panel" style="display:none;">
            <div class="sections" id="Bsections"></div>
        </div>
    </div>

    <div class="footer-nav">
        <button id="navA" class="nav-btn btnA active" onclick="switchPlayer('A')">A選手</button>
        <button id="navB" class="nav-btn btnB" onclick="switchPlayer('B')">B選手</button>
    </div>
</div>

<script>
let codes = { A: [], B: [] };
let currentPlayer = 'A';

const sectionsData = [
    {title:"器械", items:[{c:73, n:"触れる\n当たる"}, {c:74, n:"切断"}, {c:75, n:"落下"}]},
    {title:"その他", items:[{c:77, n:"静止\n時間"}, {c:78, n:"コート外"}, {c:79, n:"忘却"}]},
    {title:"剣法・服飾", items:[{c:60, n:"撩剣\n掛剣"}, {c:61, n:"握剣"}, {c:76, n:"服飾\n不備"}]},
    {title:"腿法", items:[{c:24, n:"分脚\n蹬脚"}, {c:25, n:"擺蓮脚"}, {c:26, n:"拍脚"}]},
    {title:"歩型歩法", items:[{c:50, n:"弓歩"}, {c:53, n:"仆歩"}, {c:54, n:"歩型\n歩法"}]},
    {title:"バランス", items:[{c:70, n:"ゆれ\n移動"}, {c:71, n:"附加\n支持"}, {c:72, n:"倒れる"}]}
];

function buildUI(player) {
    let html = "";
    sectionsData.forEach(sec => {
        html += `<div class="section"><div class="section-title">${sec.title}</div>`;
        sec.items.forEach(item => {
            html += `<div class="btn-item" onclick="addCode('${player}', ${item.c}, this.querySelector('.code-btn'))"><button class="code-btn">${item.c}</button><div class="code-label">${item.n}</div></div>`;
        });
        html += `</div>`;
    });
    document.getElementById(player + "sections").innerHTML = html;
}
buildUI("A"); buildUI("B");

function switchPlayer(p) {
    currentPlayer = p;
    document.getElementById('undoA').classList.toggle('disabled-undo', p !== 'A');
    document.getElementById('undoB').classList.toggle('disabled-undo', p !== 'B');
    document.getElementById('mainBody').classList.toggle('player-b-mode', p === 'B');
    document.getElementById('statusLabel').innerText = "ミスコード入力　【" + p + "選手】";
    document.getElementById('panelA').style.display = (p === 'A') ? 'flex' : 'none';
    document.getElementById('panelB').style.display = (p === 'B') ? 'flex' : 'none';
    document.getElementById('navA').classList.toggle('active', p === 'A');
    document.getElementById('navB').classList.toggle('active', p === 'B');
}

function addCode(p, c, btn) {
    codes[p].push(c);
    updateDisplay();
    btn.classList.add("flash");
    setTimeout(() => btn.classList.remove("flash"), 250);
}

function undo(p) { codes[p].pop(); updateDisplay(); }

function getScore(player) {
    let totalDeduction = 0;
    codes[player].forEach(c => {
        if (c === 71 || c === 74) totalDeduction += 2;
        else if (c === 72 || c === 75) totalDeduction += 3;
        else totalDeduction += 1;
    });
    return ((50 - totalDeduction) / 10).toFixed(2);
}

function calculateAndReset() {
    const sA = getScore('A');
    const sB = getScore('B');
    // 確認ダイアログ内の得点を上下に並べ、以前より2サイズ大きく表示
    const confirmMsg = `【 最終得点結果 】\n\n A選手： ${sA} 点\n\n B選手： ${sB} 点\n\nデータをリセットしますか？`;
    if (confirm(confirmMsg)) {
        codes = { A: [], B: [] };
        updateDisplay();
    }
}

function updateDisplay() {
    const out = document.getElementById("sharedOutput");
    out.innerHTML = `<div class="score-row">A: <span class="score-big">${getScore('A')}</span> ${codes.A.join(",")}</div>` +
                    `<div class="score-row">B: <span class="score-big">${getScore('B')}</span> ${codes.B.join(",")}</div>`;
    out.scrollTop = out.scrollHeight;
}
updateDisplay();
</script>
</body>
</html>
